<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Code Pro</title>
    
    <!-- CodeMirror 6 Core -->
    <script type="module">
        import {EditorView, basicSetup} from "https://codemirror.net/6/codemirror.js";
        import {javascript} from "https://codemirror.net/6/lang-javascript.js";
        import {oneDark} from "https://codemirror.net/6/theme-one-dark.js";

        // Initialize Editor
        const editor = new EditorView({
            doc: "// Start coding on your iPad...\nfunction hello() {\n  console.log('Hello iPad!');\n}",
            extensions: [
                basicSetup,
                javascript(),
                oneDark
            ],
            parent: document.getElementById("editor")
        });

        window.view = editor; // Export for keyboard access
    </script>

    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --accent: #38bdf8;
            --blur: 12px;
            --border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* THEMES */
        body.theme-white { --bg-color: #ffffff; --panel-bg: #f1f5f9; --text-color: #0f172a; --border: 1px solid #e2e8f0; }
        body.theme-dark { --bg-color: #000000; --panel-bg: #111111; --text-color: #ffffff; }
        body.theme-minimal { --bg-color: #ffffff; --panel-bg: transparent; --text-color: #333; --border: none; --blur: 0px; }
        body.theme-glass { --bg-color: transparent; background: linear-gradient(135deg, #1e293b, #0f172a); }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            overflow: hidden;
        }

        /* Layout */
        .app-container { display: flex; flex-direction: column; height: 100vh; }

        /* Toolbar */
        .toolbar {
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; background: var(--panel-bg); backdrop-filter: blur(var(--blur));
            border-bottom: var(--border); z-index: 10;
        }

        /* Editor Area */
        #editor { flex: 1; overflow: auto; font-size: 16px; /* Prevents iPad zoom */ }
        .cm-editor { height: 100% !important; }

        /* Custom Keyboard Styling */
        #custom-keyboard {
            display: none; height: 180px; background: var(--panel-bg);
            backdrop-filter: blur(var(--blur)); border-top: var(--border);
            padding: 10px; grid-template-columns: repeat(10, 1fr); gap: 8px;
        }
        #custom-keyboard.active { display: grid; }
        .key {
            background: rgba(255,255,255,0.1); border: var(--border); border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            color: var(--text-color); font-weight: bold; cursor: pointer;
        }
        .key:active { background: var(--accent); color: white; }

        select, button {
            background: rgba(255,255,255,0.1); border: var(--border); color: var(--text-color);
            padding: 8px 12px; border-radius: 8px; outline: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="toolbar">
        <div class="logo" style="font-weight: 800; font-size: 1.2rem;">iPad<span style="color:var(--accent)">Code</span></div>
        <div class="controls">
            <select onchange="document.body.className = 'theme-' + this.value">
                <option value="glass">Glass Theme</option>
                <option value="white">White Theme</option>
                <option value="dark">Dark Theme</option>
                <option value="minimal">Minimal Theme</option>
            </select>
            <button onclick="toggleKeyboard()" id="kb-btn">⌨️ Keyboard: OFF</button>
        </div>
    </div>

    <div id="editor"></div>

    <!-- Custom Coding Keyboard -->
    <div id="custom-keyboard">
        <div class="key" onclick="insert('{')">{</div>
        <div class="key" onclick="insert('}')">}</div>
        <div class="key" onclick="insert('(')">(</div>
        <div class="key" onclick="insert(')')">)</div>
        <div class="key" onclick="insert('[')">[</div>
        <div class="key" onclick="insert(']')">]</div>
        <div class="key" onclick="insert(';')">;</div>
        <div class="key" onclick="insert('=')">=</div>
        <div class="key" onclick="insert('=>')">=&gt;</div>
        <div class="key" onclick="insert('\"')">"</div>
        <div class="key" onclick="insert('<')">&lt;</div>
        <div class="key" onclick="insert('>')">&gt;</div>
        <div class="key" onclick="insert('/')">/</div>
        <div class="key" onclick="insert('.')">.</div>
        <div class="key" onclick="insert(':')">:</div>
        <div class="key" onclick="insert(',')">,</div>
        <div class="key" style="grid-column: span 2;" onclick="insert('    ')">TAB</div>
        <div class="key" style="grid-column: span 2; background: var(--accent);" onclick="insert('\n')">ENTER</div>
    </div>
</div>

<script>
    function toggleKeyboard() {
        const kb = document.getElementById('custom-keyboard');
        const btn = document.getElementById('kb-btn');
        kb.classList.toggle('active');
        const isActive = kb.classList.contains('active');
        btn.innerText = isActive ? "⌨️ Keyboard: ON" : "⌨️ Keyboard: OFF";
        
        // When custom keyboard is on, we might want to prevent the default 
        // iOS keyboard from taking half the screen.
        if(isActive) {
            document.querySelector('.cm-content').setAttribute('inputmode', 'none');
        } else {
            document.querySelector('.cm-content').setAttribute('inputmode', 'text');
        }
    }

    function insert(chars) {
        const view = window.view;
        const mainSel = view.state.selection.main;
        view.dispatch({
            changes: {from: mainSel.from, to: mainSel.to, insert: chars},
            selection: {anchor: mainSel.from + chars.length}
        });
        view.focus();
    }
</script>

</body>
</html>
